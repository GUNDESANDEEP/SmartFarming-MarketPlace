version: '3.8'

services:
  # PostgreSQL Database (matches Neon PostgreSQL in production)
  postgres:
    image: postgres:16-alpine
    container_name: smartfarmer-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-smartfarmingdb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartfarmer-network

  # Redis Cache (matches Redis Cloud in production)
  redis:
    image: redis:7-alpine
    container_name: smartfarmer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartfarmer-network

  # Backend Flask API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: smartfarmer-backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-smartfarmingdb}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-smartfarmingdb}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      FLASK_ENV: ${FLASK_ENV:-development}
      PORT: 8000
      EMAIL_SENDER: ${EMAIL_SENDER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - smartfarmer-network
    restart: unless-stopped

  # Frontend React App
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: smartfarmer-frontend
    environment:
      REACT_APP_API_URL: http://localhost:8000/api
      REACT_APP_ENV: development
      REACT_APP_RAZORPAY_KEY: ${REACT_APP_RAZORPAY_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - smartfarmer-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  smartfarmer-network:
    driver: bridge
